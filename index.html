<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Learning Theory — Study & Quiz</title>
<style>
  :root{
    --bg:#0b0f14;
    --panel:#131a22;
    --panel2:#1a232d;
    --line:#26313f;
    --text:#e7eef6;
    --muted:#93a4b8;
    --accent:#3fb6c8;
    --accent-dim:#1e4d57;
    --good:#3fb950;
    --good-dim:#123d1d;
    --bad:#f0575f;
    --bad-dim:#45191d;
    --radius:14px;
    --sidebar:288px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    -webkit-text-size-adjust:100%;
  }
  .app{display:flex;min-height:100vh;}

  /* ---------- sidebar ---------- */
  aside{
    width:var(--sidebar);flex:0 0 var(--sidebar);
    background:var(--panel);border-right:1px solid var(--line);
    padding:22px 16px 40px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}
  .brand small{display:block;letter-spacing:0;text-transform:none;color:var(--muted);font-weight:400;font-size:12px;margin-top:4px;}
  .overall{margin:18px 0 20px;padding:12px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;}
  .overall .num{font-size:24px;font-weight:700;}
  .overall .lbl{font-size:12px;color:var(--muted);}
  nav{display:flex;flex-direction:column;gap:4px;}
  .navbtn{
    display:block;width:100%;text-align:left;cursor:pointer;
    background:transparent;border:1px solid transparent;color:var(--text);
    border-radius:10px;padding:10px 12px;font:inherit;font-size:14px;line-height:1.35;
    transition:background .12s,border-color .12s;
  }
  .navbtn:hover{background:var(--panel2);}
  .navbtn.active{background:var(--accent-dim);border-color:var(--accent);}
  .navbtn .row{display:flex;align-items:baseline;gap:8px;justify-content:space-between;}
  .navbtn .t{font-weight:600;}
  .navbtn .sc{font-size:11px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums;}
  .navbtn.active .sc{color:#cfeef4;}
  .bar{height:4px;border-radius:99px;background:#0c1219;margin-top:8px;overflow:hidden;}
  .bar i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s;}
  .bar i.full{background:var(--good);}
  .navsep{height:1px;background:var(--line);margin:14px 2px;}
  .resetbtn{margin-top:22px;width:100%;background:transparent;border:1px solid var(--line);color:var(--muted);
    border-radius:9px;padding:9px;font:inherit;font-size:12px;cursor:pointer;}
  .resetbtn:hover{border-color:var(--bad);color:var(--bad);}

  /* ---------- main ---------- */
  main{flex:1;min-width:0;padding:36px 40px 96px;max-width:920px;}
  h1{font-size:30px;line-height:1.2;margin:0 0 6px;letter-spacing:-.01em;}
  .kicker{color:var(--accent);font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:10px;}
  .summary{color:#cdd9e6;font-size:17px;margin:0 0 26px;}
  h2{font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:32px 0 12px;font-weight:700;}
  ul.points{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;}
  ul.points li{
    background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:10px;padding:12px 15px;
  }
  .verbatim{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:12px 0;}
  .verbatim .vt{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px;}
  .verbatim pre{margin:0;white-space:pre-wrap;font:inherit;color:#dbe6f0;}
  .srcs{font-size:12px;color:var(--muted);margin-top:26px;padding-top:14px;border-top:1px solid var(--line);}

  .btn{
    display:inline-block;cursor:pointer;font:inherit;font-weight:600;
    background:var(--accent);color:#04222a;border:none;border-radius:10px;padding:13px 22px;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);}
  .btn.ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:30px;}

  /* ---------- quiz ---------- */
  .qhead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .qcount{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .qbar{height:5px;background:var(--panel2);border-radius:99px;overflow:hidden;margin-bottom:28px;}
  .qbar i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s;}
  .qtype{display:inline-block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);
    border:1px solid var(--accent-dim);background:#0e2a31;border-radius:99px;padding:3px 10px;margin-bottom:12px;font-weight:700;}
  .qtext{font-size:21px;line-height:1.45;margin:0 0 22px;font-weight:600;}
  .opts{display:flex;flex-direction:column;gap:9px;}
  .opt{
    text-align:left;cursor:pointer;font:inherit;color:var(--text);
    background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;
    display:flex;gap:12px;align-items:flex-start;transition:border-color .12s,background .12s;
  }
  .opt:hover:not(:disabled){border-color:var(--accent);}
  .opt:disabled{cursor:default;}
  .opt .key{
    flex:0 0 24px;height:24px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);
  }
  .opt.correct{background:var(--good-dim);border-color:var(--good);}
  .opt.correct .key{background:var(--good);border-color:var(--good);color:#04220c;}
  .opt.wrong{background:var(--bad-dim);border-color:var(--bad);}
  .opt.wrong .key{background:var(--bad);border-color:var(--bad);color:#2a0508;}
  .fib{display:flex;gap:10px;flex-wrap:wrap;}
  .fib input{
    flex:1;min-width:200px;font:inherit;font-size:17px;color:var(--text);
    background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;
  }
  .fib input:focus{outline:none;border-color:var(--accent);}
  .fib input:disabled{opacity:.75;}
  .blank{color:var(--accent);letter-spacing:.06em;}
  .fb{margin-top:18px;border-radius:12px;padding:15px 17px;border:1px solid var(--line);background:var(--panel);}
  .fb.ok{border-color:var(--good);background:var(--good-dim);}
  .fb.no{border-color:var(--bad);background:var(--bad-dim);}
  .fb .verdict{font-weight:700;margin-bottom:6px;}
  .fb .why{color:#dbe6f0;}
  .fb .src{font-size:12px;color:var(--muted);margin-top:9px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}

  .result{text-align:center;padding:40px 20px;}
  .result .score{font-size:64px;font-weight:800;line-height:1;letter-spacing:-.03em;}
  .result .pct{color:var(--accent);font-size:18px;margin-top:8px;}
  .result .msg{color:var(--muted);margin-top:14px;}
  .result .btnrow{justify-content:center;}

  .note{font-size:13px;color:var(--muted);background:var(--panel);border:1px solid var(--line);
    border-left:3px solid var(--muted);border-radius:10px;padding:11px 14px;margin-top:18px;}

  .menutoggle{display:none;}

  @media (max-width:900px){
    .app{flex-direction:column;}
    aside{
      width:100%;flex:none;height:auto;position:static;border-right:none;border-bottom:1px solid var(--line);
      padding:16px 16px 18px;
    }
    aside nav,aside .overall,aside .resetbtn,aside .navsep{display:none;}
    aside.open nav,aside.open .overall,aside.open .resetbtn,aside.open .navsep{display:block;}
    aside.open nav{display:flex;}
    .menutoggle{
      display:block;margin-top:12px;width:100%;background:var(--panel2);border:1px solid var(--line);
      color:var(--text);border-radius:10px;padding:11px;font:inherit;font-weight:600;cursor:pointer;
    }
    main{padding:24px 18px 80px;max-width:none;}
    h1{font-size:25px;}
    .qtext{font-size:19px;}
    .result .score{font-size:52px;}
  }
  /* ---------- confusables ---------- */
  .cmp{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin:14px 0;}
  .cmphead{font-weight:700;margin-bottom:10px;}
  .cmpgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .cmpcol{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
  .cmpname{font-weight:700;color:var(--accent);font-size:14px;margin-bottom:6px;}
  .cmpline{font-size:14px;border-left:2px solid var(--line);padding-left:8px;margin:6px 0;font-style:italic;}
  .cmptip{margin-top:10px;font-size:13px;color:var(--muted);}
  @media (max-width:640px){ .cmpgrid{grid-template-columns:1fr;} }

  /* ---------- exam ---------- */
  .examtimer{position:sticky;top:0;z-index:5;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:8px 14px;display:flex;justify-content:space-between;gap:10px;
    font-variant-numeric:tabular-nums;margin-bottom:14px;font-size:14px;}
  .examtimer.low{border-color:var(--bad);color:var(--bad);}
  .rev{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:10px 0;}
  .rev .rq{font-weight:600;}
  .rev .ra{font-size:14px;margin-top:6px;}
  .rev .ra.bad{color:var(--bad);}
  .rev .ra.good{color:var(--good);}
  .rev .why{font-size:13px;color:var(--muted);margin-top:6px;}
  .rev .src{font-size:12px;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>
<div class="app">
  <aside id="aside">
    <div class="brand">Learning Theory<small>Dog training · slide deck study set</small></div>
    <button class="menutoggle" id="menutoggle">☰ Topics</button>
    <div class="overall">
      <div class="num" id="overallNum">0%</div>
      <div class="lbl" id="overallLbl">overall best score</div>
    </div>
    <nav id="nav"></nav>
    <div class="navsep"></div>
    <button class="resetbtn" id="resetbtn">Reset all progress</button>
  </aside>
  <main id="main"></main>
</div>

{

  sources:["IMG_3619 2.HEIC","IMG_3635 2.HEIC","IMG_3636 2.HEIC","IMG_3637 2.HEIC","IMG_3638 2.HEIC"],
  summary:"Operant conditioning is the second model: behaviour modified by its consequences, as formulated by B.F. Skinner. The deck breaks it into a four-quadrant diagram built from two axes — reinforcement vs. punishment (does behaviour increase or decrease?) and positive vs. negative (is a stimulus added or removed?) — with negative reinforcement splitting further into escape and avoidance. It closes with a caution not to equate any quadrant with any particular training tool.",

    "Punishments are the presentation of an adverse event or outcome that decreases in the behavior it follows.",

  ],
  verbatim:[
    {t:"Terminology (verbatim)",body:"+ Positive:  Addition or Presence of stimulus\n– Negative:  Removal or Absence of stimulus\nR Reinforcement:  Increases behavior\nP Punishment:  Decreases behavior\nEscape:  Removes a stimulus\nAvoidance:  Prevents a stimulus"},
    {t:"Operant Conditioning diagram",body:"Operant Conditioning\n├─ Reinforcement — Increase Behavior\n│   ├─ Positive — Add desirable stimuli\n│   └─ Negative\n│        ├─ Escape — Remove undesirable stimuli following correct behavior\n│        └─ Avoidance — Correct behavior avoids undesirable stimuli\n└─ Punishment — Decrease Behavior\n     ├─ Positive — Add undesirable stimuli\n     └─ Negative — Remove desirable stimuli (penalty)"},
    {t:"Skinner, quoted on the slide",body:"“The consequences of behavior determine the probability that the behavior will occur again”  — B.F. Skinner"}
  ],
  questions:[

    {type:"fib",q:"Operant conditioning is also called <span class='blank'>__________</span> conditioning.",acc:["instrumental","instrumental conditioning"],src:"IMG_3619 2.HEIC",why:"“Also called instrumental conditioning; learning occurs through rewards and punishments for behavior.”"},
    {type:"mc",q:"In operant conditioning, the association is made between…",opts:["A behavior and its consequence","Two stimuli","Two behaviors","A stimulus and a reflex"],a:0,src:"IMG_3619 2.HEIC",why:"“Association is made between a behavior and its consequence.” Linking two stimuli is classical conditioning."},
    {type:"mc",q:"How does the deck define reinforcements?",opts:["Any event that strengthens or increases the behavior it follows","The presentation of an adverse event that decreases behavior","Any consequence delivered after a delay","Any event the trainer finds pleasant"],a:0,src:"IMG_3635 2.HEIC",why:"Reinforcements: “Any event that strengthens or increases the behavior it follows.”"},
    {type:"fib",q:"In the terminology slide, “+ Positive” means the <span class='blank'>__________</span> or presence of a stimulus.",acc:["addition","adding","add"],src:"IMG_3638 2.HEIC",why:"“+ Positive: Addition or Presence of stimulus.”"},
    {type:"fib",q:"“– Negative” means the removal or <span class='blank'>__________</span> of stimulus.",acc:["absence"],src:"IMG_3638 2.HEIC",why:"“– Negative: Removal or Absence of stimulus.”"},
    {type:"mc",q:"In the diagram, “Positive” under Reinforcement is defined as…",opts:["Add desirable stimuli","Add undesirable stimuli","Remove desirable stimuli","Remove undesirable stimuli"],a:0,src:"IMG_3636 2.HEIC",why:"Reinforcement → Positive → “Add desirable stimuli.”"},
    {type:"mc",q:"In the diagram, “Negative” under Punishment is defined as…",opts:["Remove desirable stimuli (penalty)","Add undesirable stimuli","Add desirable stimuli","Remove undesirable stimuli"],a:0,src:"IMG_3636 2.HEIC",why:"Punishment → Negative → “Remove desirable stimuli (penalty).”"},

  ]

  summary:"Reinforcers divide two ways. First by origin: primary (unconditioned) reinforcers are things the dog believes it cannot live without, while secondary (conditioned) reinforcers work through a developed association. Second by direction: positive reinforcers add something pleasant after a behavior, negative reinforcers remove something unpleasant — and either way the reward must be valuable to the dog and delivered on time.",
  points:[

  questions:[

  summary:"Punishment also splits positive (presenting something unfavorable) and negative (removing something favorable). The deck sets three hard conditions on any punishment — appropriate, timely, consistent — and names secondary punishments such as a warning beep or a verbal marker. It ends on the cost of getting this wrong: excessive punishment can produce learned helplessness.",
  points:[

    "Negative punishment occurs when a favorable event or outcome is removed after a behavior occurs.",
    "Punishment must be appropriate: the minimum punishment required to create the desired change in behavior.",
    "Punishment must be timely — attached to the misbehavior; delayed punishment is ineffective.",
    "Punishment must be consistent: if you can't do it every time, best not do it at all; and beware of self-rewarding behaviors.",
    "Secondary punishments include a warning tone or beep, and the verbal “Uh uh” or “No”.",
    "Learned helplessness is when the dog believes it has no control over its environment — summarised as “No matter what I do, I'm wrong” and as resignation.",
    "Learned helplessness is frequently brought about by use of excessive punishment and may lead to escape, avoidance, aggression, or other negative responses."
  ],
  verbatim:[

  ],

{
  id:"schedules",
  title:"Schedules of Reinforcement",
  sources:["IMG_3658.HEIC","IMG_3659.HEIC","IMG_3660.HEIC"],
  summary:"Skinner's schedules describe when reinforcement arrives, split into duration schedules (based on time) and ratio schedules (based on number of responses), each of which can be fixed or variable. Continuous reinforcement — rewarding every single repetition — is impractical and leaves behavior prone to extinction. The deck's headline principle is that unpredictable reinforcement produces the most predictable behavior.",
  points:[
    "Analysis of behavior involves the effects of a schedule of reinforcement over time; the schedules listed are Skinner's.",
    "Duration Fixed: reinforcement is presented at fixed time periods, after the dog has performed the behavior.",
    "Duration Variable: the response is rewarded after the behavior has been performed for an unpredictable amount of time.",
    "Ratio Fixed: reinforcement is delivered after a specific number of responses.",
    "Ratio Variable: the response is reinforced after an unpredictable number of responses.",
    "Continuous reinforcement means every time a specific action is performed the subject instantly receives a reinforcement; it is impractical to use consistently and behavior is prone to extinction.",
    "Fixed Ratio (FR) produces a high, steady rate of response with only a brief pause after the delivery of the reinforcement.",
    "Variable Ratio (VR) creates a high, steady rate of responding and produces slightly higher rates than FR because the organism doesn't know when the next reinforcement is; the higher the ratio, the higher the response."
  ],
  verbatim:[
    {t:"Skinner's notable schedules of reinforcement (verbatim)",body:"Duration\n    Fixed; presented at fixed time periods, after dog has performed the behavior.\n    Variable; Response is rewarded after the behavior has been performed for an\n    unpredictable amount of time\n\nRatio\n    Fixed; Reinforcement is delivered after a specific number of responses\n    Variable; Response is reinforced after an unpredictable number of responses"},
    {t:"The headline principle",body:"Unpredictability in reinforcement = Greater predictability in behavior"}
  ],
  questions:[
    {type:"mc",q:"Whose notable schedules of reinforcement does the deck present?",opts:["Skinner's","Pavlov's","Karen Pryor's","John Watson's"],a:0,src:"IMG_3658.HEIC",why:"“Skinner's notable schedules of reinforcement:” introduces the list."},
    {type:"mc",q:"What are the two families of schedule listed?",opts:["Duration and Ratio","Fixed and Variable","Primary and Secondary","Positive and Negative"],a:0,src:"IMG_3658.HEIC",why:"The two headings are Duration and Ratio; Fixed and Variable are the sub-types under each."},
    {type:"mc",q:"Fixed duration means reinforcement is…",opts:["Presented at fixed time periods, after the dog has performed the behavior","Delivered after a specific number of responses","Given every single time","Withheld until the dog offers a new behavior"],a:0,src:"IMG_3658.HEIC",why:"That is the slide's exact definition of Duration — Fixed. A specific number of responses is the Ratio — Fixed definition."},
    {type:"mc",q:"Variable duration means the response is rewarded after…",opts:["The behavior has been performed for an unpredictable amount of time","An unpredictable number of responses","Exactly 30 seconds","The dog offers three behaviors"],a:0,src:"IMG_3658.HEIC",why:"Duration — Variable is about an unpredictable amount of time; an unpredictable number of responses is Ratio — Variable."},
    {type:"mc",q:"Fixed ratio means reinforcement is delivered after…",opts:["A specific number of responses","A fixed period of time","Every response","An unpredictable number of responses"],a:0,src:"IMG_3658.HEIC",why:"“Fixed; Reinforcement is delivered after a specific number of responses.”"},
    {type:"fib",q:"Variable ratio: the response is reinforced after an <span class='blank'>__________</span> number of responses.",acc:["unpredictable"],src:"IMG_3658.HEIC",why:"“Variable; Response is reinforced after an unpredictable number of responses.”"},
    {type:"mc",q:"What does continuous reinforcement mean?",opts:["Every time a specific action is performed the subject instantly receives a reinforcement","Reinforcement arrives on a fixed clock","Reinforcement is given at random","Reinforcement continues after training ends"],a:0,src:"IMG_3659.HEIC",why:"“Every time a specific action is performed the subject instantly receives a reinforcement.”"},
    {type:"tf",q:"Continuous reinforcement is impractical to use consistently, and behavior on it is prone to extinction.",a:true,src:"IMG_3659.HEIC",why:"Both statements appear as bullets on the Continuous Reinforcement slide."},
    {type:"fib",q:"Complete the principle: “Unpredictability in reinforcement = Greater <span class='blank'>__________</span> in behavior.”",acc:["predictability"],src:"IMG_3659.HEIC",why:"This is the bold italic line closing the Continuous Reinforcement slide."},
    {type:"mc",q:"What does a Fixed Ratio (FR) schedule produce?",opts:["A high, steady rate of response with only a brief pause after the delivery of the reinforcement","A slow, irregular rate of response","No response at all without a clicker","A response only under distraction"],a:0,src:"IMG_3660.HEIC",why:"That is the slide's description of FR — note the brief pause after reinforcement, which VR does not have."},
    {type:"tf",q:"Variable Ratio schedules produce slightly higher rates of responding than Fixed Ratio schedules.",a:true,src:"IMG_3660.HEIC",why:"“VR produce slightly higher rates of responding than FR; organism doesn't know when next reinforcement is.”"},
    {type:"fib",q:"“The higher the ratio, the higher the <span class='blank'>__________</span>.”",acc:["response","responding"],src:"IMG_3660.HEIC",why:"The final line of the Ratio Schedules slide."}
  ]

function norm(s){
  return String(s).toLowerCase().trim()
    .replace(/[‘’]/g,"'").replace(/[“”]/g,'"')
    .replace(/[.,;:!?"']/g,"").replace(/\s+/g," ");
}
function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function shuffle(a){
  const r = a.slice();
  for(let i=r.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; }
  return r;
}
function pct(id){
  const b = state.best[id];
  if(!b || !b.total) return 0;
  return Math.round(100*b.correct/b.total);
}

/* ---- mastery: a question is mastered once answered right twice in a row ---- */
function topicMastery(t){
  // m: mastered (streak ≥2) · weak: last-wrong or error history, not mastered
  // unseen: never answered. First-time-right questions (streak 1, no errors)
  // count in none of these — they're simply in progress.
  let m = 0, weak = 0, unseen = 0;
  t.questions.forEach(q => {
    const s = state.q[q.qid];
    if(!s || !s.s) unseen++;
    else if(s.k >= 2) m++;
    else if(s.k === 0 || s.r < s.s) weak++;
  });
  return {m, weak, unseen};
}
function weakCounts(){
  let m = 0, weak = 0, unseen = 0;
  TOPICS.forEach(t => { const tm = topicMastery(t); m += tm.m; weak += tm.weak; unseen += tm.unseen; });
  return {m, weak, unseen};
}
function weakPool(){
  // Last-answer-wrong first, then near-misses with an error history,
  // topped up with never-seen questions.
  const a = [], b = [], c = [];
  TOPICS.forEach(t => t.questions.forEach(q => {
    const s = state.q[q.qid];
    const qq = Object.assign({}, q, {_topic: t.title});
    if(!s || !s.s) c.push(qq);
    else if(s.k === 0) a.push(qq);
    else if(s.k < 2 && s.r < s.s) b.push(qq);
  }));
  return shuffle(a).concat(shuffle(b), shuffle(c)).slice(0, DRILL_SIZE);
}

/* ---- spaced review: mastered questions come due on widening intervals ---- */
function duePool(){
  const now = Date.now(), due = [];
  TOPICS.forEach(t => t.questions.forEach(q => {
    const s = state.q[q.qid];
    if(s && s.k >= 2 && s.due && s.due <= now) due.push(Object.assign({}, q, {_topic: t.title}));
  }));
  return shuffle(due);
}
function nextDueAt(){
  let min = null;
  TOPICS.forEach(t => t.questions.forEach(q => {
    const s = state.q[q.qid];
    if(s && s.k >= 2 && s.due && (min === null || s.due < min)) min = s.due;
  }));
  return min;
}

let rapid = null;
function startRapid(){
  rapid = {items: shuffle(RAPID), i:0, right:0, misses:{}, t0: Date.now()};
  renderRapid();
  window.scrollTo(0,0);
}
function renderRapid(){
  const it = rapid.items[rapid.i];
  const c = CONFUSABLES.find(x=>x.id===it.cid);
  main.innerHTML =
    '<div class="qhead"><div class="kicker" style="margin:0">Rapid round</div>'+
    '<div class="qcount">'+(rapid.i+1)+' of '+rapid.items.length+' · '+rapid.right+' right</div></div>'+
    '<div class="qbar"><i style="width:'+Math.round(100*rapid.i/rapid.items.length)+'%"></i></div>'+
    '<div class="qtype">Which is it?</div>'+
    '<p class="qtext">“'+esc(it.text)+'”</p>'+
    '<div class="opts">'+
      '<button class="opt" data-s="L"><span class="key">1</span><span>'+esc(c.l.name)+'</span></button>'+
      '<button class="opt" data-s="R"><span class="key">2</span><span>'+esc(c.r.name)+'</span></button>'+
    '</div>';
  main.querySelectorAll(".opt").forEach(b=>{
    b.onclick = ()=>{
      const ok = b.dataset.s === it.side;
      if(ok) rapid.right++; else rapid.misses[it.cid] = (rapid.misses[it.cid]||0)+1;
      main.querySelectorAll(".opt").forEach(x=>{
        x.disabled = true;
        if(x.dataset.s===it.side) x.classList.add("correct");
        else if(x===b && !ok) x.classList.add("wrong");
      });
      setTimeout(()=>{ rapid.i++; rapid.i < rapid.items.length ? renderRapid() : rapidResult(); }, ok? 350 : 950);
    };
  });
}
function rapidResult(){
  const ms = Date.now() - rapid.t0;
  const total = rapid.items.length;
  const prev = state.rapid;
  if(!prev || rapid.right > prev.score || (rapid.right === prev.score && ms < prev.ms)){
    state.rapid = {score: rapid.right, total: total, ms: ms}; save();
  }
  const missed = Object.keys(rapid.misses);
  main.innerHTML = '<div class="result">'+
    '<div class="score">'+rapid.right+'<span style="color:var(--muted);font-size:.5em">/'+total+'</span></div>'+
    '<div class="pct">'+Math.round(ms/1000)+' seconds</div>'+
    '<div class="msg">'+esc(missed.length? 'Mixed up: '+missed.map(id=>CONFUSABLES.find(c=>c.id===id).title).join(' · ')+'. Re-read those cards.' : 'Clean calls across the board.')+'</div>'+
    '<div class="btnrow"><button class="btn" id="rapidagain">Run it again</button>'+
    '<button class="btn ghost" id="rapidback">Back to the cards</button></div></div>';
  $("#rapidagain").onclick = startRapid;
  $("#rapidback").onclick = showConfusables;
  renderNav(); window.scrollTo(0,0);
}

/* ============================================================
   QUIZ ENGINE
   ============================================================ */
let quiz = null;

function startQuiz(questions, id, title, isRetry){
  stopExamTimer();
  quiz = {qs:questions, i:0, correct:0, wrong:[], id:id, title:title, retry:!!isRetry};
  renderQ();
  window.scrollTo(0,0);
}

function renderQ(){
  const q = quiz.qs[quiz.i];
  const typeLabel = q.type==="mc" ? "Multiple choice" : q.type==="tf" ? "True or false" : "Fill in the blank";
  const progress = Math.round(100*quiz.i/quiz.qs.length);

  let body = "";
  if(q.type==="mc"){
    // Render options in shuffled order; data-i keeps the original index so
    // scoring/highlighting stay correct and the answer isn't always "A".
    const order = shuffle(q.opts.map((_,i)=>i));
    body = '<div class="opts">'+ order.map((orig,pos)=>
      '<button class="opt" data-i="'+orig+'"><span class="key">'+"ABCD"[pos]+'</span><span>'+esc(q.opts[orig])+'</span></button>'
    ).join("") +'</div>';
  } else if(q.type==="tf"){
    body = '<div class="opts">'+
      '<button class="opt" data-i="1"><span class="key">T</span><span>True</span></button>'+
      '<button class="opt" data-i="0"><span class="key">F</span><span>False</span></button>'+
    '</div>';
  } else {
    body = '<div class="fib"><input type="text" id="fibin" autocomplete="off" autocapitalize="off" '+
      'spellcheck="false" placeholder="Type your answer…"><button class="btn" id="fibgo">Check</button></div>';
  }

  main.innerHTML =
    '<div class="qhead"><div class="kicker" style="margin:0">'+esc(quiz.title)+(quiz.retry?" · retry":"")+'</div>'+
    '<div class="qcount">Question '+(quiz.i+1)+' of '+quiz.qs.length+' · '+quiz.correct+' right</div></div>'+
    '<div class="qbar"><i style="width:'+progress+'%"></i></div>'+
    '<div class="qtype">'+typeLabel+'</div>'+
    (q._topic? '<div style="color:var(--muted);font-size:13px;margin-bottom:6px">from: '+esc(q._topic)+'</div>' : '')+
    '<p class="qtext">'+q.q+'</p>'+
    body+
    '<div id="fbslot"></div>';

  if(q.type==="fib"){
    const inp = $("#fibin");
    inp.focus();
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter") checkFib(); });
    $("#fibgo").onclick = checkFib;
  } else {
    main.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick = ()=> checkChoice(parseInt(btn.dataset.i,10));
    });
  }
}

function checkChoice(picked){
  const q = quiz.qs[quiz.i];
  const right = q.type==="tf" ? (q.a===true?1:0) : q.a;
  const ok = picked===right;
  main.querySelectorAll(".opt").forEach(b=>{
    const i = parseInt(b.dataset.i,10);
    b.disabled = true;
    if(i===right) b.classList.add("correct");
    else if(i===picked) b.classList.add("wrong");
  });
  finishQ(ok, q);
}

function checkFib(){
  const q = quiz.qs[quiz.i];
  const inp = $("#fibin");
  const val = norm(inp.value);
  if(!val) { inp.focus(); return; }
  const ok = q.acc.some(a=> norm(a)===val);
  inp.disabled = true;
  $("#fibgo").disabled = true;
  inp.style.borderColor = ok ? "var(--good)" : "var(--bad)";
  finishQ(ok, q);
}

// Per-question mastery stats + spaced-review scheduling.
// Every answer counts, in any mode. Mastered (streak 2) starts the review
// clock; each further correct answer pushes the next check out one interval;
// a miss resets streak AND schedule, dropping the question back into the drill.
function recordAnswer(ok, q){
  if(!q.qid) return null;
  const stq = state.q[q.qid] || (state.q[q.qid] = {s:0,r:0,k:0});
  stq.s++;
  if(ok){
    stq.r++; stq.k++;
    if(stq.k === 2){ stq.iv = 0; stq.due = Date.now() + REVIEW_IVS[0]; }
    else if(stq.k > 2){ stq.iv = Math.min((stq.iv||0)+1, REVIEW_IVS.length-1); stq.due = Date.now() + REVIEW_IVS[stq.iv]; }
  } else {
    stq.k = 0; delete stq.due; delete stq.iv;
  }
  save();
  return stq;
}

function finishQ(ok, q){
  if(ok) quiz.correct++; else quiz.wrong.push(q);

  const stq = recordAnswer(ok, q);
  let streakNote = "";
  if(stq){
    if(ok && stq.k===2) streakNote = " · mastered ✓ · review in "+ivLabel(0);
    else if(ok && stq.k>2) streakNote = " · streak "+stq.k+" · next check in "+ivLabel(stq.iv);
    else if(ok) streakNote = " · 1 more to master";
    else if(stq.s>1) streakNote = " · streak reset";
  }

  let answerLine = "";
  if(!ok){
    if(q.type==="mc") answerLine = "Answer: "+q.opts[q.a]+". ";
    else if(q.type==="tf") answerLine = "Answer: "+(q.a?"True":"False")+". ";
    else answerLine = "Answer: "+q.acc[0]+". ";
  }
  const fb = document.createElement("div");
  fb.className = "fb " + (ok?"ok":"no");
  fb.innerHTML =
    '<div class="verdict">'+(ok?"✓ Correct":"✗ Not quite")+esc(streakNote)+'</div>'+
    '<div class="why">'+esc(answerLine)+esc(q.why)+'</div>'+
    '<div class="src">Source: '+esc(q.src)+'</div>'+
    '<div class="btnrow" style="margin-top:16px"><button class="btn" id="nextq">'+
      (quiz.i+1 < quiz.qs.length ? "Next question" : "See results")+'</button></div>';
  $("#fbslot").appendChild(fb);
  $("#nextq").focus();
  $("#nextq").onclick = ()=>{
    quiz.i++;
    if(quiz.i < quiz.qs.length) renderQ(); else showResult();
  };
  fb.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function showResult(){
  const total = quiz.qs.length, c = quiz.correct;
  const p = Math.round(100*c/total);

  // Only a full (non-retry) run updates the recorded best score.
  if(!quiz.retry){
    const prev = state.best[quiz.id];
    if(!prev || c/total > prev.correct/prev.total) state.best[quiz.id] = {correct:c,total:total};
    save();
  }

  const msg = p===100 ? "Every question right. Nothing left to review here."
    : p>=80 ? "Strong pass — tidy up the misses and you're done."
    : p>=50 ? "Halfway there. Run the wrong ones back."
    : "Worth re-reading the study sheet before another pass.";

  let html = '<div class="result">'+
    '<div class="score">'+c+'<span style="color:var(--muted);font-size:.5em">/'+total+'</span></div>'+
    '<div class="pct">'+p+'%</div>'+
    '<div class="msg">'+esc(msg)+'</div>'+
    '<div class="btnrow">';
  if(quiz.wrong.length){
    const w = quiz.wrong.slice();
    html += '<button class="btn" id="retrywrong">Retry '+w.length+' wrong '+(w.length===1?"answer":"answers")+'</button>';
  }
  html += (quiz.id==="__due" ? '' : '<button class="btn ghost" id="again">'+(quiz.id==="__drill"?"New drill":"Take it again")+'</button>')+
          '<button class="btn ghost" id="back">'+(quiz.id.startsWith("__")?"Back":"Back to study sheet")+'</button>'+
          '</div></div>';
  main.innerHTML = html;

  const wrongCopy = quiz.wrong.slice();
  const qsCopy = quiz.qs.slice();
  const id = quiz.id, title = quiz.title;

  if($("#retrywrong")) $("#retrywrong").onclick = ()=> startQuiz(shuffle(wrongCopy), id, title, true);
  if($("#again")) $("#again").onclick = ()=>{
    if(id==="__mixed"){
      const pool=[];
      TOPICS.forEach(t=> t.questions.forEach(q=> pool.push(Object.assign({},q,{_topic:t.title}))));
      startQuiz(shuffle(pool).slice(0,MIXED_SIZE), id, title);
    } else if(id==="__drill"){
      startQuiz(weakPool(), id, title, true);
    } else startQuiz(qsCopy, id, title);
  };
  $("#back").onclick = ()=>
    id==="__mixed" ? showMixedIntro() :
    id==="__drill" ? showDrillIntro() :
    id==="__due"   ? showDueIntro()   : showTopic(id);
  renderNav();
  window.scrollTo(0,0);
}

/* ============================================================
   EXAM MODE — timed, no feedback until the end
   ============================================================ */
let exam = null, examTick = null;

function stopExamTimer(){ if(examTick){ clearInterval(examTick); examTick = null; } }
function fmtMs(ms){
  const s = Math.max(0, Math.ceil(ms/1000));
  return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
}
function examPool(){
  // At least 2 questions from every topic, random fill to EXAM_SIZE.
  let picked = [];
  const rest = [];
  TOPICS.forEach(t=>{
    const qs = shuffle(t.questions.map(q=>Object.assign({},q,{_topic:t.title})));
    picked = picked.concat(qs.slice(0,2));
    rest.push(...qs.slice(2));
  });
  picked = picked.concat(shuffle(rest).slice(0, Math.max(0, EXAM_SIZE - picked.length)));
  return shuffle(picked).slice(0, EXAM_SIZE);
}

function showExamIntro(){
  stopExamTimer();
  const b = state.examBest;
  main.innerHTML =
    '<div class="kicker">Exam mode</div><h1>📝 Mock exam</h1>'+
    '<p class="summary">'+EXAM_SIZE+' questions drawn from every topic, '+Math.round(EXAM_MS()/60000)+' minutes on the clock, and no feedback until the end — exam conditions. '+EXAM_PASS+'% is the pass mark. Every answer still counts toward per-question mastery, so misses land in the weak-spot drill.</p>'+
    '<ul class="points">'+
      '<li>At least 2 questions from each of the '+TOPICS.length+' topics; fill-ins lock on Enter.</li>'+
      '<li>If time runs out, unanswered questions count as wrong.</li>'+
      (b? '<li>Best so far: '+b.correct+'/'+b.total+' ('+Math.round(100*b.correct/b.total)+'%)'+(b.pass?' — a pass.':'.')+'</li>':'')+
    '</ul>'+
    '<div class="btnrow"><button class="btn" id="startexam">Start exam · '+EXAM_SIZE+' questions · '+Math.round(EXAM_MS()/60000)+' min</button></div>';
  $("#startexam").onclick = startExam;
  renderNav(); window.scrollTo(0,0);
}

function startExam(){
  stopExamTimer();
  exam = {qs: examPool(), i:0, answers:[], t0: Date.now(), end: Date.now()+EXAM_MS()};
  examTick = setInterval(()=>{
    const el = $("#examclock");
    if(!el) return;                       // view changed; closeMenu clears us too
    const left = exam.end - Date.now();
    if(left <= 0){ finishExam(true); return; }
    el.textContent = fmtMs(left);
    el.parentElement.classList.toggle("low", left < 2*60*1000);
  }, 250);
  renderExamQ();
  window.scrollTo(0,0);
}

function renderExamQ(){
  const q = exam.qs[exam.i];
  const typeLabel = q.type==="mc" ? "Multiple choice" : q.type==="tf" ? "True or false" : "Fill in the blank";
  let body = "";
  if(q.type==="mc"){
    const order = shuffle(q.opts.map((_,i)=>i));
    body = '<div class="opts">'+ order.map((orig,pos)=>
      '<button class="opt" data-i="'+orig+'"><span class="key">'+"ABCD"[pos]+'</span><span>'+esc(q.opts[orig])+'</span></button>'
    ).join("") +'</div>';
  } else if(q.type==="tf"){
    body = '<div class="opts">'+
      '<button class="opt" data-i="1"><span class="key">T</span><span>True</span></button>'+
      '<button class="opt" data-i="0"><span class="key">F</span><span>False</span></button>'+
    '</div>';
  } else {
    body = '<div class="fib"><input type="text" id="fibin" autocomplete="off" autocapitalize="off" '+
      'spellcheck="false" placeholder="Type your answer…"><button class="btn" id="fibgo">Lock in</button></div>';
  }
  main.innerHTML =
    '<div class="examtimer"><span>📝 Mock exam · '+(exam.i+1)+' of '+exam.qs.length+'</span>'+
    '<span id="examclock">'+fmtMs(exam.end-Date.now())+'</span></div>'+
    '<div class="qbar"><i style="width:'+Math.round(100*exam.i/exam.qs.length)+'%"></i></div>'+
    '<div class="qtype">'+typeLabel+'</div>'+
    '<p class="qtext">'+q.q+'</p>'+
    body;
  if(q.type==="fib"){
    const inp = $("#fibin");
    inp.focus();
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter") examAnswer("fib"); });
    $("#fibgo").onclick = ()=> examAnswer("fib");
  } else {
    main.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick = ()=> examAnswer(parseInt(btn.dataset.i,10));
    });
  }
}

function examAnswer(val){
  const q = exam.qs[exam.i];
  let ok, given;
  if(val === "fib"){
    const raw = $("#fibin").value;
    if(!norm(raw)){ $("#fibin").focus(); return; }
    ok = q.acc.some(a=> norm(a)===norm(raw));
    given = raw.trim();
  } else if(q.type==="tf"){
    ok = val === (q.a?1:0); given = val? "True":"False";
  } else {
    ok = val === q.a; given = q.opts[val];
  }
  recordAnswer(ok, q);
  exam.answers.push({q:q, ok:ok, given:given});
  exam.i++;
  if(exam.i < exam.qs.length) renderExamQ(); else finishExam(false);
}

function finishExam(expired){
  stopExamTimer();
  const unanswered = exam.qs.slice(exam.answers.length);
  unanswered.forEach(q=>{ recordAnswer(false, q); exam.answers.push({q:q, ok:false, given:null}); });

  const total = exam.qs.length;
  const c = exam.answers.filter(a=>a.ok).length;
  const p = Math.round(100*c/total);
  const pass = p >= EXAM_PASS;
  const prev = state.examBest;
  if(!prev || c > prev.correct) state.examBest = {correct:c, total:total, pass:pass};
  save();

  let html = '<div class="result">'+
    '<div class="score">'+c+'<span style="color:var(--muted);font-size:.5em">/'+total+'</span></div>'+
    '<div class="pct" style="color:'+(pass?"var(--good)":"var(--bad)")+'">'+p+'% — '+(pass?"PASS":"below the "+EXAM_PASS+"% pass mark")+'</div>'+
    '<div class="msg">'+(expired? "Time ran out — unanswered questions counted as wrong. ":"")+'Time used: '+fmtMs(Date.now()-exam.t0)+'.</div>'+
    '<div class="btnrow">'+
      (c<total? '<button class="btn" id="examdrill">Drill the '+(total-c)+' miss'+(total-c===1?"":"es")+'</button>':'')+
      '<button class="btn ghost" id="examagain">New exam</button>'+
      '<button class="btn ghost" id="examback">Back</button>'+
    '</div>'+
    '<h2 style="margin-top:34px;text-align:left">Answer review</h2>';
  exam.answers.forEach((a,i)=>{
    const q = a.q;
    const correctText = q.type==="mc" ? q.opts[q.a] : q.type==="tf" ? (q.a?"True":"False") : q.acc[0];
    html += '<div class="rev" style="text-align:left"><div class="rq">'+(i+1)+'. '+q.q+'</div>'+
      '<div class="ra '+(a.ok?"good":"bad")+'">'+
        (a.ok ? '✓ '+esc(correctText)
              : '✗ Your answer: '+esc(a.given===null? "— (not answered)" : a.given)+' — correct: '+esc(correctText))+'</div>'+
      (a.ok? '' : '<div class="why">'+esc(q.why)+'</div>')+
      '<div class="src">'+(q._topic? esc(q._topic)+' · ':'')+'Source: '+esc(q.src)+'</div></div>';
  });
  html += '</div>';
  main.innerHTML = html;

  const missed = exam.answers.filter(a=>!a.ok).map(a=>a.q);
  if($("#examdrill")) $("#examdrill").onclick = ()=> startQuiz(shuffle(missed), "__drill", "Exam misses", true);
  $("#examagain").onclick = startExam;
  $("#examback").onclick = showExamIntro;
  renderNav(); window.scrollTo(0,0);
}

/* ============================================================
   BOOT — land on the review queue if anything is due
   ============================================================ */
if(duePool().length){ current = "__due"; showDueIntro(); }
else showTopic(TOPICS[0].id);
</script>
</body>
